<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网页</title>
    <style>
        /* 这里是样式（CSS），用来给网页化妆 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <!-- 这里是内容（HTML），网页的骨架 -->
    <h1>凯文第十就是牛</h1>
    <p>20260714A</p>
    
    <h3>常用标签小科普：</h3>
    <ul>
        <li><strong>&lt;h1&gt; 到 &lt;h6&gt;</strong>：标题标签，数字越小字越大。</li>
        <li><strong>&lt;p&gt;</strong>：段落标签，用来写正文。</li>
        <li><strong>&lt;ul&gt; 和 &lt;li&gt;</strong>：无序列表。</li>
    </ul>

    <br>
    <a href="https://www.baidu.com" target="_blank" class="btn">点我访问百度</a>

    <script>
        // 这里是脚本（JavaScript），让网页能动起来
        console.log("网页加载成功啦！");
    </script>
</body>
</html>
